name: CI

# Fast lane — runs on every push/PR. Builds the TursoSync package family (Release, warnings-as-errors) and
# runs the test suite. This lane does NOT build the Turso native, so the native-gated tests skip (Inconclusive)
# rather than run. The full native + live-sync integration run is gated in integration.yml (manual / weekly /
# release tag / `full-ci`-labelled PR) so it doesn't rebuild the engine on every commit.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build+test · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore TursoSync.slnx

      - name: Build (Release, warnings-as-errors)
        run: dotnet build TursoSync.slnx --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test TursoSync.slnx --configuration Release --no-build --verbosity normal
