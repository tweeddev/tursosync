name: CI

# Build + test the TursoSync package family on all three OSes. Fetches the Turso engine at the pinned ref
# (turso-engine.json) and builds the sync native in RELEASE with FTS so the provider tests run for real
# (debug natives are ~25x slower). Test-only — releases are handled by release.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read engine pin
        id: pin
        shell: bash
        run: |
          sha=$(grep -oE '"sha"[[:space:]]*:[[:space:]]*"[0-9a-f]+"' turso-engine.json | grep -oE '[0-9a-f]{7,40}')
          [ -n "$sha" ] || { echo "::error::no sha in turso-engine.json"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout Turso engine
        uses: actions/checkout@v4
        with:
          repository: tursodatabase/turso
          ref: ${{ steps.pin.outputs.sha }}
          path: turso

      - name: Cache Turso Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: turso
          key: ${{ steps.pin.outputs.sha }}

      - name: Build Turso native (Release, FTS)
        shell: bash
        run: |
          cargo build --manifest-path turso/Cargo.toml -p turso_sync_sdk_kit --features turso_sdk_kit/fts --release
          echo "TURSOSYNC_NATIVE_DIR=${{ github.workspace }}/turso/target/release" >> "$GITHUB_ENV"

      - name: Build Turso sync server (tursodb)
        shell: bash
        run: |
          # The CLI doubles as a self-hostable sync server (`tursodb --sync-server`); the live-sync
          # integration tests spawn it so the remote TursoSyncDatabase path runs for real, not skipped.
          cargo build --manifest-path turso/Cargo.toml -p turso_cli --release
          exe=""
          [ "${{ runner.os }}" = "Windows" ] && exe=".exe"
          echo "TURSOSYNC_SYNC_SERVER=${{ github.workspace }}/turso/target/release/tursodb$exe" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore TursoSync.slnx

      - name: Build (Release, warnings-as-errors)
        run: dotnet build TursoSync.slnx --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test TursoSync.slnx --configuration Release --no-build --verbosity normal
