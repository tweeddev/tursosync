name: Release

# Tag-triggered release. Builds the turso_sync_sdk_kit native (sync engine + tantivy FTS) in RELEASE on a
# NATIVE runner for each RID (no cross-compilation, engine pinned via turso-engine.json), gathers them into
# runtimes/<rid>/native/, then packs + pushes all three packages to NuGet via trusted publishing (OIDC —
# no API key secret).
#
# Trigger: shipRig pushes a per-package tag `TursoSync@1.2.3` (see .changeset/release.jsonc), or run
# manually (workflow_dispatch, defaults to dry-run = pack only). Versioning is owned by shipRig; this only
# builds + ships. Sibling tags (TursoSync.DbUp@…, .Dapper@…) don't match this filter, so a release fires
# exactly one run that publishes all three at the same version.
#
# Prereqs: a NuGet.org trusted-publishing policy for each package (TursoSync, TursoSync.DbUp,
# TursoSync.Dapper) linking this repo's Release workflow, and repo variable NUGET_USER (your nuget.org username).

on:
  push:
    tags: ['TursoSync@*']
  workflow_dispatch:
    inputs:
      version:
        description: Version to pack (e.g. 1.2.3 or 1.2.3-preview.1)
        required: true
      dry_run:
        description: Pack only, do not push
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native:
    name: native · ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        # Each RID builds for an explicit target. osx-x64 cross-builds from the Apple Silicon runner
        # (reliable on macOS) instead of the fading Intel macos-13 image; arm64 Linux/Windows use native
        # runners (cross-OS is the brittle path we avoid).
        include:
          - { os: ubuntu-latest,    rid: linux-x64,   target: x86_64-unknown-linux-gnu,  lib: libturso_sync_sdk_kit.so }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, target: aarch64-unknown-linux-gnu, lib: libturso_sync_sdk_kit.so }
          - { os: macos-latest,     rid: osx-x64,     target: x86_64-apple-darwin,       lib: libturso_sync_sdk_kit.dylib }
          - { os: macos-latest,     rid: osx-arm64,   target: aarch64-apple-darwin,      lib: libturso_sync_sdk_kit.dylib }
          - { os: windows-latest,   rid: win-x64,     target: x86_64-pc-windows-msvc,    lib: turso_sync_sdk_kit.dll }
          - { os: windows-11-arm,   rid: win-arm64,   target: aarch64-pc-windows-msvc,   lib: turso_sync_sdk_kit.dll }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read engine pin
        id: pin
        shell: bash
        run: |
          sha=$(grep -oE '"sha"[[:space:]]*:[[:space:]]*"[0-9a-f]+"' turso-engine.json | grep -oE '[0-9a-f]{7,40}')
          [ -n "$sha" ] || { echo "::error::no sha in turso-engine.json"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Checkout Turso engine
        uses: actions/checkout@v4
        with:
          repository: tursodatabase/turso
          ref: ${{ steps.pin.outputs.sha }}
          path: turso

      - name: Cache Turso Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: turso
          key: ${{ steps.pin.outputs.sha }}-${{ matrix.rid }}

      - name: Build native (Release, FTS, stripped)
        shell: bash
        # strip=true uses Rust's export-safe strip (keeps the #[no_mangle] turso_sync_* exports) — cuts the
        # native size dramatically (esp. Linux debuginfo) so the package stays under nuget.org's 250 MB cap.
        run: cargo build --manifest-path turso/Cargo.toml -p turso_sync_sdk_kit --features turso_sdk_kit/fts --release --target ${{ matrix.target }} --config profile.release.strip=true

      - name: Stage native
        shell: bash
        run: |
          mkdir -p "out/${{ matrix.rid }}/native"
          cp "turso/target/${{ matrix.target }}/release/${{ matrix.lib }}" "out/${{ matrix.rid }}/native/${{ matrix.lib }}"

      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: out/${{ matrix.rid }}/native/${{ matrix.lib }}
          if-no-files-found: error

  pack:
    name: pack + push
    needs: native
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # required for NuGet trusted publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Resolve version + publish gate
        id: cfg
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${GITHUB_REF_NAME##*@}"   # TursoSync@1.2.3 -> 1.2.3
            publish=true
          else
            version="${{ inputs.version }}"
            publish=$([ "${{ inputs.dry_run }}" = "false" ] && echo true || echo false)
          fi
          [ -n "$version" ] || { echo "::error::no version resolved"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "Version=$version  Publish=$publish"

      - name: Download natives
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: staging

      - name: Lay out runtimes into the TursoSync package
        shell: bash
        run: |
          dest="src/TursoSync/runtimes"
          mkdir -p "$dest"
          for dir in staging/native-*; do
            rid="${dir#staging/native-}"
            mkdir -p "$dest/$rid/native"
            cp "$dir"/* "$dest/$rid/native/"
          done
          find "$dest" -type f

      - name: Pack
        run: >
          dotnet pack TursoSync.slnx
          --configuration Release
          --output artifacts
          -p:Version=${{ steps.cfg.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error

      - name: NuGet trusted-publishing login
        if: steps.cfg.outputs.publish == 'true'
        id: nuget
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push
        if: steps.cfg.outputs.publish == 'true'
        shell: bash
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "${{ steps.nuget.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      # GitHub Release for the tag (notes auto-generated from merged PRs/commits). Tag-triggered runs only;
      # prerelease versions (containing '-') are marked as such. Attaches the .nupkg files for convenience.
      - name: GitHub Release
        if: github.event_name == 'push' && steps.cfg.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ver="${{ steps.cfg.outputs.version }}"
          pre=""
          case "$ver" in *-*) pre="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" \
            --title "TursoSync $ver" \
            --generate-notes \
            $pre \
            artifacts/*.nupkg
